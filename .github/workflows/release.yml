# AI 小说编辑器 · 自动构建与发布工作流
#
# 触发方式：
#   - 推送 tag (v*) → 构建并发布到 GitHub Releases
#   - 推送 main/master → 仅构建验证，不发布
#   - Pull Request → 构建验证
#
# 产物: dida.exe (Windows x64 单文件，内嵌前端静态资源)

name: Build & Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main, master]

  # 允许手动触发重新构建
  workflow_dispatch:
    inputs:
      tag:
        description: '要重新发布的标签（留空则仅构建验证）'
        required: false
        type: string

jobs:
  build:
    name: 构建 dida.exe
    # 仅支持 Windows（WebView2 + go-webview2 COM 调用）
    runs-on: windows-latest

    # 权限：创建 Release 需要
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取全部历史，便于生成版本号

      # ========================================
      # 环境准备
      # ========================================

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: 缓存 pnpm 依赖
        uses: actions/cache@v4
        with:
          path: frontend/node_modules/.pnpm
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # ========================================
      # 构建前端
      # ========================================

      - name: 安装前端依赖
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: 构建前端
        working-directory: frontend
        run: pnpm build

      # ========================================
      # 复制前端产物到后端嵌入目录
      # ========================================

      - name: 复制静态文件
        shell: pwsh
        run: |
          $dist = "backend/frontend/dist"
          if (Test-Path $dist) { Remove-Item -Recurse -Force $dist }
          New-Item -ItemType Directory -Path $dist -Force | Out-Null
          Copy-Item -Recurse -Path "frontend/dist/*" -Destination $dist

      # ========================================
      # 构建 Go 生产版本
      # ========================================

      - name: 提取版本号
        shell: pwsh
        id: version
        run: |
          # 从 git tag 或 commit 生成版本号
          $tag = git describe --tags --abbrev=0 2>$null
          if ($tag) {
            $ver = $tag
          } else {
            $ver = "dev-$((git rev-parse --short HEAD))"
          }
          Write-Host "version=$ver"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$ver"

      - name: 构建 Go 后端
        working-directory: backend
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -tags production -buildvcs=false `
            -ldflags="-H=windowsgui -X main.devMode=false" `
            -o "../dida-${{ steps.version.outputs.version }}.exe" .

      # ========================================
      # 上传构建产物（供后续 job 或手动下载）
      # ========================================

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dida-${{ steps.version.outputs.version }}
          path: dida-${{ steps.version.outputs.version }}.exe
          if-no-files-found: error

      # ========================================
      # 发布到 GitHub Releases（仅 tag 推送时）
      # ========================================

      - name: 创建 Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: AI 小说编辑器 ${{ github.ref_name }}
          body: |
            ## AI 小说编辑器 ${{ github.ref_name }}

            📥 下载 `dida-${{ github.ref_name }}.exe` 后双击运行即可。

            ### 系统要求
            - Windows 10 (v1803+) 或 Windows 11
            - 已预装 WebView2 Runtime（Windows 11 自带，Win10 自动更新也会安装）

            ### 更新说明
            请查看 [CHANGELOG](./CHANGELOG.md) 了解此版本的详细变更。

            > 首次运行时，如 Windows Defender 弹出警告，点击"更多信息"→"仍要运行"即可。
          tag_name: ${{ github.ref_name }}
          files: dida-${{ github.ref_name }}.exe
          draft: false
          prerelease: false
